<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konnect — Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── LOGIN VIEW ──────────────────────────────────────────────── -->
  <div id="view-login" class="view active">
    <div class="card">
      <div class="card-header">
        <h1 class="logo">Konnect</h1>
        <p class="subtitle">Sign in to your account</p>
      </div>
      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" data-target="login-password" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>
        <div id="login-error" class="msg error hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>
      <p class="switch-text">
        Don't have an account?
        <a href="#" id="go-register">Create one</a>
      </p>
    </div>
  </div>

  <!-- ─── REGISTER VIEW ───────────────────────────────────────────── -->
  <div id="view-register" class="view">
    <div class="card">
      <div class="card-header">
        <h1 class="logo">Konnect</h1>
        <p class="subtitle">Create your account</p>
      </div>
      <form id="form-register" novalidate>
        <div class="field">
          <label for="reg-name">Full Name</label>
          <input id="reg-name" type="text" placeholder="John Doe" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <div class="password-wrap">
            <input id="reg-password" type="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" data-target="reg-password" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>
        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <div class="password-wrap">
            <input id="reg-confirm" type="password" placeholder="Repeat password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" data-target="reg-confirm" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>
        <div id="register-error" class="msg error hidden"></div>
        <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
      </form>
      <p class="switch-text">
        Already have an account?
        <a href="#" id="go-login">Sign in</a>
      </p>
    </div>
  </div>

  <!-- ─── OTP VERIFICATION VIEW ───────────────────────────────────── -->
  <div id="view-otp" class="view">
    <div class="card">
      <div class="card-header">
        <h1 class="logo">Konnect</h1>
        <p class="subtitle">Enter the OTP sent to your email</p>
        <p id="otp-email-hint" class="email-hint"></p>
      </div>
      <form id="form-otp" novalidate>
        <div class="field otp-field">
          <label for="otp-input">One-Time Password</label>
          <input
            id="otp-input"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="6"
            placeholder="_ _ _ _ _ _"
            autocomplete="one-time-code"
            required
          />
        </div>
        <div id="otp-error" class="msg error hidden"></div>
        <button type="submit" class="btn-primary" id="otp-btn">Verify OTP</button>
        <button type="button" class="btn-ghost" id="resend-btn">Resend OTP</button>
      </form>
    </div>
  </div>

  <!-- ─── DASHBOARD VIEW ──────────────────────────────────────────── -->
  <div id="view-dashboard" class="view">
    <div class="dashboard">
      <header class="dash-header">
        <h1 class="logo">Konnect</h1>
        <button class="btn-ghost" id="logout-btn">Logout</button>
      </header>
      <main class="dash-body">
        <div class="welcome-card">
          <span class="avatar" id="dash-avatar"></span>
          <h2 id="dash-greeting">Welcome back!</h2>
          <p class="token-label">Access Token</p>
          <code id="dash-token" class="token-box"></code>
          <div id="logout-msg" class="msg success hidden">You have been signed out.</div>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
